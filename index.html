<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================================
       やたてぃ学園はじめラ部 應援網站 — 首頁  v5
       ------------------------------------------------------------
       ★ 共用樣式：assets/style.css（改配色去這裡）
       ★ 共用程式：assets/common.js（導覽列、頁尾、語言、燈箱）
       ★ 本頁程式：assets/home.js
       ★ 內容資料：data/site.json、data/projects/
       ★ 本機預覽：資料夾執行 python3 -m http.server → http://localhost:8000
         （直接雙擊開啟會被瀏覽器擋住資料載入）
       ============================================================ -->

  <title>やたてぃ学園はじめラ部｜轟はじめ應援企劃（非官方）</title>
  <meta name="description" content="やたてぃ学園はじめラ部による轟はじめ應援企劃（非官方）。應援廣告、netprint、寄せ書き、明信片配布等粉絲企劃資訊。" />

  <!-- 社群分享預覽：og:url / og:image 為正式網域 yataty-gakuen.com 的完整網址 -->
  <meta property="og:title" content="やたてぃ学園はじめラ部" />
  <meta property="og:description" content="轟はじめ應援企劃（非官方）" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yataty-gakuen.com/" />
  <meta property="og:image" content="https://yataty-gakuen.com/images/og-cover.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <!-- 導覽列由 common.js 自動插入到這之前 -->

  <!-- Hero -->
  <section class="hero" id="top">
    <p class="hero-kicker">YATATY GAKUEN HAJIME RABU</p>
    <h1 data-i18n="hero_title"></h1>
    <p class="hero-tags" id="hero-tags"></p>
    <svg class="hero-bolt-bg" viewBox="0 0 100 160" aria-hidden="true">
      <path d="M62 0 L12 88 L44 88 L30 160 L92 60 L56 60 Z" fill="#8a73c9"/>
    </svg>
  </section>

  <div id="error-slot"></div>

  <!-- 番長的回信（はじめ對本企劃的回應）。無資料時由 home.js 隱藏 -->
  <section id="replies" style="display:none">
    <div class="container">
      <h2 class="section-title"><span data-i18n="sec_replies"></span> <span class="en">FROM HAJIME</span></h2>
      <div class="reply-grid" id="replies-grid"></div>
    </div>
  </section>

  <section id="news">
    <div class="container">
      <h2 class="section-title"><span data-i18n="sec_news"></span> <span class="en">NEWS</span></h2>
      <ul class="news-list" id="news-list"></ul>
    </div>
  </section>

  <section id="ongoing" style="background: var(--c-white)">
    <div class="container">
      <h2 class="section-title"><span data-i18n="sec_ongoing"></span> <span class="en">ONGOING</span></h2>
      <div class="project-grid" id="ongoing-grid"></div>
      <p class="see-past"><a href="past.html" id="see-past-link"></a></p>
    </div>
  </section>

  <!-- 頁尾由 common.js 自動插入到這之後 -->

  <script src="assets/common.js"></script>
  <script src="assets/home.js"></script>
</body>
</html>
