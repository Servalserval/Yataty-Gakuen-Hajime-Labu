<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================================
       轟はじめ 生誕祭應援企劃（非官方）  v4 模組化版
       ------------------------------------------------------------
       ★ 這個檔案是「版面＋程式」，平常【不需要】動它。
       ★ 內容全部在 data/ 資料夾的 JSON 檔：
           data/site.json            全站設定（hero、公告、頁尾）
           data/projects/_list.json  企劃清單
           data/projects/<企劃>/      每個企劃一個資料夾
       ★ 詳細維護方法請看同層的 README.md。
       ★ 注意：因為內容是用 fetch 載入的，直接雙擊開 index.html
         會因瀏覽器安全限制看不到內容（會顯示錯誤提示）。
         本機預覽請在資料夾裡執行：  python3 -m http.server
         然後開 http://localhost:8000 。部署到網路上則完全正常。
       ============================================================ -->

  <title>轟はじめ生誕祭應援企劃（非官方）｜真っす組</title>
  <meta name="description" content="轟はじめ生日應援企劃（非官方）。應援廣告、netprint、寄せ書き、免費明信片配布等粉絲企劃資訊都在這裡！" />

  <!-- ★ 社群分享預覽：og:image 和 og:url「必須是 https:// 開頭的完整網址」，
       相對路徑在 X／Discord 上不會顯示預覽圖。上線後把網域換成自己的！ -->
  <meta property="og:title" content="轟はじめ生誕祭應援企劃（非官方）" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://你的網域.pages.dev/" />
  <meta property="og:image" content="https://你的網域.pages.dev/images/og-cover.png" />

  <!-- 網站小圖示（分頁上的⚡，不用另外準備圖檔） -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ==========================================================
       主題變數（整站配色從這裡改）
       はじめ形象色「鐵灰／銀」＋ 推しマーク「⚡雷」的閃電黃
       ========================================================== */
    :root {
      --c-ink:        #23262b;
      --c-steel:      #585f6a;
      --c-silver:     #c9ced6;
      --c-paper:      #f4f5f7;
      --c-white:      #ffffff;
      --c-bolt:       #ffd028;
      --c-bolt-deep:  #e6a800;

      --font-display: "RocknRoll One", "Zen Kaku Gothic New", sans-serif;
      --font-body:    "Zen Kaku Gothic New", "Noto Sans TC", sans-serif;

      --max-w: 1080px;
      --radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--c-paper); color: var(--c-ink); line-height: 1.8; }
    img { max-width: 100%; display: block; }
    a { color: inherit; }
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 20px; }
    section { padding: 72px 0; }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2rem);
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 36px;
    }
    .section-title::before {
      content: ""; width: 10px; height: 1.3em;
      background: var(--c-bolt); transform: skewX(-15deg);
    }
    .section-title .en { font-size: 0.55em; color: var(--c-steel); letter-spacing: 0.2em; }

    /* ===== 導覽列 ===== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(35, 38, 43, 0.95);
      backdrop-filter: blur(6px);
      color: var(--c-white);
    }
    .nav-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; gap: 12px;
    }
    .nav-logo { font-family: var(--font-display); text-decoration: none; font-size: 1.02rem; white-space: nowrap; }
    .nav-logo .bolt { color: var(--c-bolt); }
    .nav-right { display: flex; align-items: center; gap: 18px; }
    nav ul { display: flex; gap: 24px; list-style: none; }
    nav a {
      text-decoration: none; font-size: 0.92rem;
      padding-bottom: 4px; border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    nav a:hover, nav a:focus-visible { border-bottom-color: var(--c-bolt); }
    .lang-btn {
      background: none; border: 1px solid var(--c-silver); color: var(--c-white);
      border-radius: 999px; padding: 4px 14px; cursor: pointer;
      font-family: var(--font-body); font-size: 0.85rem;
      transition: background 0.2s, color 0.2s;
    }
    .lang-btn:hover { background: var(--c-bolt); color: var(--c-ink); border-color: var(--c-bolt); }
    .nav-toggle {
      display: none;
      background: none; border: 0; color: var(--c-white);
      font-size: 1.6rem; cursor: pointer;
    }

    /* ===== Hero ===== */
    .hero {
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 14px),
        linear-gradient(160deg, #2b2f36 0%, #1b1d21 100%);
      color: var(--c-white);
      text-align: center;
      padding: 84px 20px 96px;
      position: relative; overflow: hidden;
    }
    .hero-kicker { color: var(--c-bolt); letter-spacing: 0.35em; font-size: 0.9rem; margin-bottom: 18px; }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1.3;
      text-shadow: 4px 4px 0 rgba(255, 208, 40, 0.25);
    }
    .hero-fanart {
      margin: 36px auto 0;
      max-width: min(440px, 86vw);
      background: var(--c-white);
      padding: 12px 12px 10px;
      transform: rotate(-1.5deg);
      box-shadow: 0 14px 36px rgba(0,0,0,0.45);
      position: relative; z-index: 1;
    }
    .hero-fanart img { width: 100%; border-radius: 2px; }
    .hero-fanart::before {
      content: "";
      position: absolute; top: -12px; left: 50%;
      width: 110px; height: 26px;
      transform: translateX(-50%) rotate(2deg);
      background: rgba(255, 208, 40, 0.85);
    }
    .fanart-credit { font-size: 0.8rem; color: var(--c-steel); margin-top: 8px; text-align: right; }
    .fanart-credit a { color: var(--c-bolt-deep); text-decoration: none; }
    .fanart-credit a:hover { text-decoration: underline; }
    .hero-date {
      display: inline-block; margin-top: 32px;
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      background: var(--c-bolt); color: var(--c-ink);
      padding: 8px 28px;
      transform: skewX(-8deg);
    }
    .countdown { margin-top: 26px; }
    .countdown-label { font-size: 0.9rem; color: var(--c-silver); letter-spacing: 0.15em; }
    .countdown-nums { display: flex; gap: 14px; justify-content: center; margin-top: 10px; font-family: var(--font-display); }
    .countdown-nums .unit { text-align: center; }
    .countdown-nums .num {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--c-bolt);
      font-variant-numeric: tabular-nums;
      min-width: 2ch; display: inline-block;
    }
    .countdown-nums .lbl { font-size: 0.75rem; color: var(--c-silver); }
    .countdown-hbd { font-family: var(--font-display); font-size: clamp(1.4rem, 4vw, 2.2rem); color: var(--c-bolt); margin-top: 10px; }
    .hero-tags { margin-top: 26px; font-size: 0.95rem; color: var(--c-silver); }
    .hero-tags a { color: var(--c-bolt); text-decoration: none; }
    .hero-tags a:hover { text-decoration: underline; }
    .hero-bolt-bg { position: absolute; right: -40px; bottom: -60px; width: 320px; opacity: 0.08; pointer-events: none; }

    /* ===== 公告 ===== */
    .news-list { list-style: none; border-top: 1px solid var(--c-silver); }
    .news-list li { display: flex; gap: 24px; align-items: baseline; padding: 18px 6px; border-bottom: 1px solid var(--c-silver); }
    .news-date { font-size: 0.88rem; color: var(--c-steel); flex: 0 0 7em; font-variant-numeric: tabular-nums; }
    .news-list a { text-decoration: none; }
    .news-list a:hover { color: var(--c-bolt-deep); }

    /* ===== 企劃卡片 ===== */
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 28px; }
    .project-card {
      background: var(--c-white);
      border: 1px solid var(--c-silver);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .project-card:hover { transform: translateY(-4px); box-shadow: 0 10px 24px rgba(35, 38, 43, 0.12); }
    .project-photo { aspect-ratio: 16 / 10; object-fit: cover; width: 100%; }
    .project-body { padding: 22px 24px 26px; flex: 1; display: flex; flex-direction: column; }
    .project-cat {
      align-self: flex-start;
      font-size: 0.78rem; font-weight: 700;
      padding: 2px 12px; border-radius: 999px;
      margin-bottom: 10px;
      color: var(--c-ink); background: var(--c-silver);
    }
    .project-name { font-family: var(--font-display); font-size: 1.15rem; margin-bottom: 8px; }
    .project-period { font-size: 0.88rem; color: var(--c-steel); margin-bottom: 12px; }
    .project-desc { font-size: 0.94rem; flex: 1; white-space: pre-line; }
    /* 企劃 hashtag 小標籤 */
    .project-hashtags { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .project-hashtags a {
      font-size: 0.8rem; color: var(--c-bolt-deep); text-decoration: none;
    }
    .project-hashtags a:hover { text-decoration: underline; }
    .project-links { margin-top: 14px; display: flex; gap: 12px; flex-wrap: wrap; }
    .project-links a {
      font-size: 0.85rem; text-decoration: none;
      border: 1px solid var(--c-silver); border-radius: 999px;
      padding: 4px 14px;
      transition: background 0.2s, border-color 0.2s;
    }
    .project-links a:hover { background: var(--c-bolt); border-color: var(--c-bolt); }
    .badge-ongoing {
      position: absolute; top: 12px; left: 12px;
      background: var(--c-bolt); color: var(--c-ink);
      font-family: var(--font-display); font-size: 0.8rem;
      padding: 3px 14px; transform: skewX(-8deg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      z-index: 1;
    }
    .project-card.is-past .project-photo { filter: grayscale(1) brightness(0.92); }
    .project-card.is-past { background: #ededf0; }
    .project-card.is-past:hover { transform: none; box-shadow: none; }
    .badge-past {
      position: absolute; top: 12px; left: 12px;
      background: var(--c-steel); color: var(--c-white);
      font-family: var(--font-display); font-size: 0.8rem;
      padding: 3px 14px; transform: skewX(-8deg);
      z-index: 1;
    }
    .empty-hint { color: var(--c-steel); font-size: 0.95rem; }

    /* ===== 資料載入失敗的提示框 ===== */
    .load-error {
      max-width: 640px; margin: 60px auto; padding: 28px 32px;
      background: #fff3f3; border: 1px solid #e8a0a0; border-radius: var(--radius);
      font-size: 0.95rem;
    }
    .load-error code {
      background: #f0e8e8; padding: 1px 8px; border-radius: 4px;
      font-size: 0.88em;
    }

    /* ===== 頁尾 ===== */
    footer { background: var(--c-ink); color: var(--c-silver); padding: 56px 0 32px; font-size: 0.9rem; }
    .footer-grid { display: grid; gap: 36px; grid-template-columns: 2fr 1fr 1fr; margin-bottom: 40px; }
    footer h3 { color: var(--c-white); font-family: var(--font-display); font-size: 1rem; margin-bottom: 14px; }
    footer ul { list-style: none; }
    footer li + li { margin-top: 8px; }
    footer a { color: var(--c-silver); text-decoration: none; }
    footer a:hover { color: var(--c-bolt); }
    .copyright { border-top: 1px solid #3a3e45; padding-top: 22px; text-align: center; font-size: 0.8rem; color: #8b919b; }

    /* ===== 響應式 ===== */
    @media (max-width: 720px) {
      nav ul {
        display: none;
        position: absolute; top: 60px; left: 0; right: 0;
        flex-direction: column; gap: 0;
        background: var(--c-ink); padding: 8px 0;
      }
      nav ul.open { display: flex; }
      nav li { text-align: center; }
      nav a { display: block; padding: 14px; border-bottom: 0; }
      .nav-toggle { display: block; }
      .footer-grid { grid-template-columns: 1fr; }
      section { padding: 52px 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .project-card, nav a { transition: none; }
      .hero-fanart { transform: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-inner">
      <a class="nav-logo" href="#top">轟はじめ生誕祭<span class="bolt">⚡</span></a>
      <div class="nav-right">
        <nav>
          <ul id="nav-menu">
            <li><a href="#news"    data-i18n="nav_news"></a></li>

  <section class="hero" id="top">

  <!-- 資料載入失敗時會把錯誤訊息放這裡 -->
  <div id="error-slot"></div>

    <div class="container">
      <h2 class="section-title"><span data-i18n="sec_news"></span> <span class="en">NEWS</span></h2>

  <section id="ongoing" style="background: var(--c-white)">

          </ul>
        </div>

      <p class="copyright" id="footer-copyright"></p>

  <script>
    /* ============================================================
       介面固定文字（按鈕、區塊標題等）。
       內容性的文字請改 data/ 裡的 JSON，不要改這裡。
       ============================================================ */
    const STRINGS = {
      zh: {
        nav_news: "公告", nav_ongoing: "進行中的企劃", nav_past: "過去的企劃", nav_about: "關於我們",
        hero_title: "祝・轟はじめ\n生誕祭応援企画",
        sec_news: "最新公告", sec_ongoing: "進行中的企劃", sec_past: "過去的企劃",
        badge_ongoing: "進行中⚡", badge_past: "已結束",
        period: "期間：", longterm: "長期進行中", longterm_suffix: "（長期）",
        empty_ongoing: "目前沒有進行中的企劃，新企劃籌備中，敬請期待！",
        cd_label: "距離はじめ的生日還有", cd_d: "天", cd_h: "時", cd_m: "分", cd_s: "秒",
        fanart_by: "Fanart：",
        ft_about: "關於本企劃", ft_links: "相關連結", ft_quick: "快速連結",
        lang_switch_to: "日本語",
        html_lang: "zh-Hant",
        load_error_title: "內容載入失敗",
        load_error_body: "如果你是直接雙擊開啟 index.html，瀏覽器的安全限制會擋下資料載入。請在網站資料夾執行 python3 -m http.server 後開啟 http://localhost:8000 預覽；部署到網路上後不會有此問題。也請檢查 data/ 內的 JSON 格式是否正確（缺逗號、多逗號都會失敗）。",
      },
      ja: {
        nav_news: "お知らせ", nav_ongoing: "実施中の企画", nav_past: "過去の企画", nav_about: "私たちについて",
        hero_title: "祝・轟はじめ\n生誕祭応援企画",
        sec_news: "お知らせ", sec_ongoing: "実施中の企画", sec_past: "過去の企画",
        badge_ongoing: "実施中⚡", badge_past: "終了",
        period: "期間：", longterm: "常時実施中", longterm_suffix: "（常設）",
        empty_ongoing: "現在実施中の企画はありません。新企画を準備中です。お楽しみに！",
        cd_label: "はじめの誕生日まで", cd_d: "日", cd_h: "時間", cd_m: "分", cd_s: "秒",
        fanart_by: "Fanart：",
        ft_about: "本企画について", ft_links: "リンク", ft_quick: "クイックリンク",
        lang_switch_to: "中文",
        html_lang: "ja",
        load_error_title: "コンテンツの読み込みに失敗しました",
        load_error_body: "index.html を直接開くとブラウザのセキュリティ制限でデータを読み込めません。ローカルで確認する場合はフォルダ内で python3 -m http.server を実行し、http://localhost:8000 を開いてください。デプロイ後は問題なく表示されます。",
      },
    };

    /* ============================================================
       以下為渲染程式（一般不需要動）
       ============================================================ */
    const DATA_BASE = "data/";
    let SITE = null;        // data/site.json 的內容
    let PROJECTS = [];      // 所有企劃（各自帶 _dir = 自己的資料夾路徑）
    let LANG = "zh";        // 預設語言；想預設日文改 "ja"

    function saveLang(l) { try { localStorage.setItem("site-lang", l); } catch (e) {} }
    function loadLang()  { try { return localStorage.getItem("site-lang"); } catch (e) { return null; } }

    /** 多語欄位：{zh,ja}→依語言取值；純字串→原樣 */
    function t(v) {
      if (v && typeof v === "object" && !Array.isArray(v)) return v[LANG] ?? v.zh ?? Object.values(v)[0];
      return v;
    }
    function s(key) { return STRINGS[LANG][key] ?? key; }

    function el(tag, attrs = {}, text = "") {
      const node = document.createElement(tag);
      Object.entries(attrs).forEach(([k, v]) => node.setAttribute(k, v));
      if (text) node.textContent = text;
      return node;
    }

    async function fetchJSON(path) {
      // no-cache：每次都跟伺服器確認有沒有新版，
      // 避免你更新公告後，訪客的瀏覽器還拿著舊快取
      const res = await fetch(path, { cache: "no-cache" });
      if (!res.ok) throw new Error(`${path} (${res.status})`);
      return res.json();
    }

    /* ---------- 企劃分類 ----------
       到期判斷固定以「日本時間（JST）」為準：
       不管訪客在台灣、日本還是歐美，看到的分類結果都一致。 */
    function isPast(p) {
      if (!p.end) return false;
      return new Date(p.end + "T23:59:59+09:00") < new Date();
    }
    function periodText(p) {
      const fmt = d => d ? d.replaceAll("-", "/") : "";
      if (!p.start && !p.end) return s("longterm");
      if (!p.end) return `${fmt(p.start)} ～${s("longterm_suffix")}`;
      return `${fmt(p.start)} ～ ${fmt(p.end)}`;
    }

    function buildCard(p, past) {
      const card = el("article", { class: "project-card" + (past ? " is-past" : "") });

      // 封面圖：路徑相對於企劃自己的資料夾；圖檔不存在就自動隱藏
      if (p.cover) {
        const img = el("img", { class: "project-photo", src: p._dir + p.cover, alt: t(p.name), loading: "lazy" });
        img.onerror = () => img.remove();
        card.append(img);
      }

      card.append(past
        ? el("span", { class: "badge-past" }, s("badge_past"))
        : el("span", { class: "badge-ongoing" }, s("badge_ongoing")));

      const body = el("div", { class: "project-body" });
      const cat = SITE.categories[p.cat];
      if (cat) {
        const tag = el("span", { class: "project-cat" }, t(cat.label));
        tag.style.background = cat.color;
        body.append(tag);
      }
      body.append(el("h3", { class: "project-name" }, t(p.name)));
      body.append(el("p", { class: "project-period" }, s("period") + periodText(p)));
      body.append(el("p", { class: "project-desc" }, t(p.desc)));

      // hashtag 標籤 → 連到 X 搜尋
      if (p.hashtags?.length) {
        const tagBox = el("div", { class: "project-hashtags" });
        p.hashtags.forEach(h => {
          const url = "https://x.com/search?q=" + encodeURIComponent(h);
          tagBox.append(el("a", { href: url, target: "_blank", rel: "noopener" }, h));
        });
        body.append(tagBox);
      }

      if (p.links?.length) {
        const box = el("div", { class: "project-links" });
        p.links.forEach(l => box.append(el("a", { href: l.url, target: "_blank", rel: "noopener" }, t(l.label))));
        body.append(box);
      }
      card.append(body);
      return card;
    }

    /* ---------- 整頁渲染（切語言時重跑） ---------- */
    function renderAll() {
      document.documentElement.lang = s("html_lang");

      document.querySelectorAll("[data-i18n]").forEach(node => {
        const key = node.getAttribute("data-i18n");
        if (key === "hero_title") {
          node.textContent = "";
          s(key).split("\n").forEach((line, i) => {
            if (i > 0) node.append(el("br"));
            node.append(line);
          });
        } else {
          node.textContent = s(key);
        }
      });
      document.getElementById("lang-btn").textContent = s("lang_switch_to");

      /* Hero */
      document.getElementById("hero-date").textContent = SITE.hero.date;
      const fanart = SITE.hero.fanart;
      const figure = document.getElementById("hero-fanart");
      if (fanart) {
        figure.hidden = false;
        const img = document.getElementById("fanart-img");
        img.src = fanart.src;
        img.alt = t(fanart.alt);
        img.onerror = () => { figure.hidden = true; };
        const credit = document.getElementById("fanart-credit");
        credit.textContent = s("fanart_by");
        credit.append(el("a", { href: fanart.artistUrl, target: "_blank", rel: "noopener" }, fanart.artistName));
      } else {
        figure.hidden = true;
      }
      const heroTags = document.getElementById("hero-tags");
      heroTags.textContent = "";
      (SITE.hero.tags ?? []).forEach((tg, i) => {
        if (i > 0) heroTags.append("　");
        heroTags.append(el("a", { href: tg.url, target: "_blank", rel: "noopener" }, tg.label));
      });

      /* 公告 */
      const newsList = document.getElementById("news-list");
      newsList.textContent = "";
      (SITE.news ?? []).forEach(n => {
        const li = el("li");
        li.append(el("span", { class: "news-date" }, n.date));
        li.append(n.url ? el("a", { href: n.url }, t(n.title)) : el("span", {}, t(n.title)));
        newsList.append(li);
      });

      /* 企劃：自動分類＋排序 */
      const ongoing = PROJECTS.filter(p => !isPast(p));
      const past    = PROJECTS.filter(isPast);
      ongoing.sort((a, b) => (a.end ?? "9999") < (b.end ?? "9999") ? -1 : 1);
      past.sort((a, b) => (a.end < b.end ? 1 : -1));

      const ongoingGrid = document.getElementById("ongoing-grid");
      ongoingGrid.textContent = "";
      if (ongoing.length) ongoing.forEach(p => ongoingGrid.append(buildCard(p, false)));
      else ongoingGrid.append(el("p", { class: "empty-hint" }, s("empty_ongoing")));

      const pastGrid = document.getElementById("past-grid");
      pastGrid.textContent = "";
      document.getElementById("past").style.display = past.length ? "" : "none";
      past.forEach(p => pastGrid.append(buildCard(p, true)));

      /* 頁尾 */
      document.getElementById("footer-disclaimer").textContent = t(SITE.footer.disclaimer);
      const socialList = document.getElementById("footer-socials");
      socialList.textContent = "";
      (SITE.footer.socials ?? []).forEach(so => {
        const li = el("li");
        li.append(el("a", { href: so.url, target: "_blank", rel: "noopener" }, t(so.label)));
        socialList.append(li);
      });
      document.getElementById("footer-copyright").textContent = t(SITE.footer.copyright);
    }

    /* ---------- 生日倒數（以日本時間 JST 為準） ---------- */
    function startCountdown() {
      const md = SITE.hero.birthdayMonthDay;
      if (!md) return;
      const [m, d] = md.split("-").map(Number);
      const box = document.getElementById("countdown");
      const hbd = document.getElementById("countdown-hbd");

      // 取得「日本現在時間」：把本地時間平移到 UTC+9
      function nowJST() {
        const n = new Date();
        return new Date(n.getTime() + (n.getTimezoneOffset() + 540) * 60000);
      }

      function tick() {
        const now = nowJST();
        const startOfDay = new Date(now.getFullYear(), m - 1, d, 0, 0, 0);
        const endOfDay   = new Date(now.getFullYear(), m - 1, d, 23, 59, 59);
        if (now >= startOfDay && now <= endOfDay) { box.hidden = true; hbd.hidden = false; return; }
        const target = now > endOfDay ? new Date(now.getFullYear() + 1, m - 1, d) : startOfDay;
        const sec = Math.max(0, Math.floor((target - now) / 1000));
        document.getElementById("cd-d").textContent = Math.floor(sec / 86400);
        document.getElementById("cd-h").textContent = Math.floor(sec % 86400 / 3600);
        document.getElementById("cd-m").textContent = Math.floor(sec % 3600 / 60);
        document.getElementById("cd-s").textContent = sec % 60;
        box.hidden = false; hbd.hidden = true;
      }
      tick();
      setInterval(tick, 1000);
    }

    /* ---------- 載入失敗提示 ---------- */
    function showLoadError(err) {
      console.error(err);
      const box = el("div", { class: "load-error" });
      box.append(el("h2", {}, s("load_error_title")));
      box.append(el("p", {}, s("load_error_body")));
      box.append(el("p", { style: "margin-top:10px; color:#888; font-size:0.85em" }, String(err)));
      document.getElementById("error-slot").append(box);
    }

    /* ---------- 初始化：載入所有 JSON → 渲染 ---------- */
    async function init() {
      const saved = loadLang();
      if (saved === "zh" || saved === "ja") LANG = saved;

      try {
        SITE = await fetchJSON(DATA_BASE + "site.json");
        const list = await fetchJSON(DATA_BASE + "projects/_list.json");
        // 平行載入所有企劃。用 allSettled：就算某個企劃的 JSON 寫壞了
        // （多逗號、檔名打錯…），也只會略過那一筆，不會讓整個網站開天窗。
        const results = await Promise.allSettled(list.map(async id => {
          const p = await fetchJSON(`${DATA_BASE}projects/${id}/project.json`);
          p._dir = `${DATA_BASE}projects/${id}/`;
          return p;
        }));
        PROJECTS = results.filter(r => r.status === "fulfilled").map(r => r.value);
        // 壞掉的企劃印在主控台（F12 可看），方便你找出是哪一個
        results.filter(r => r.status === "rejected")
               .forEach(r => console.warn("企劃載入失敗，已略過：", r.reason));
      } catch (err) {
        showLoadError(err);
        return;
      }

      renderAll();
      startCountdown();

      document.getElementById("lang-btn").addEventListener("click", () => {
        LANG = LANG === "zh" ? "ja" : "zh";
        saveLang(LANG);
        renderAll();
      });
    }
    init();

    /* 手機版漢堡選單 */
    const toggle = document.querySelector(".nav-toggle");
    const menu = document.getElementById("nav-menu");
    toggle.addEventListener("click", () => {
      const open = menu.classList.toggle("open");
      toggle.setAttribute("aria-expanded", open);
    });
    menu.addEventListener("click", e => {
      if (e.target.tagName === "A") {
        menu.classList.remove("open");
        toggle.setAttribute("aria-expanded", "false");
      }
    });
  </script>
</body>
